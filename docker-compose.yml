version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: bakifitness
      POSTGRES_PASSWORD: bakifitness
      POSTGRES_DB: bakifitness
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakifitness"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
volumes:
  db_data:
  redis_data:
