version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: bakifitness_postgres
    environment:
      POSTGRES_DB: bakifitness_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bakifitness_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: bakifitness_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bakifitness_network

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bakifitness_backend
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bakifitness_dev
      DB_USER: postgres
      DB_PASSWORD: password
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-here
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - bakifitness_network
    command: npm run dev

  # Frontend (React Native Metro)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bakifitness_frontend
    environment:
      REACT_NATIVE_PACKAGER_HOSTNAME: 0.0.0.0
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - bakifitness_network
    command: npm start

volumes:
  postgres_data:
  redis_data:

networks:
  bakifitness_network:
    driver: bridge