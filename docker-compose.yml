version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: baki_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: baki
    ports:
      - "5432:5432"
    volumes:
      - baki_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    container_name: baki_redis
    ports:
      - "6379:6379"
    volumes:
      - baki_redis_data:/data
volumes:
  baki_pg_data:
  baki_redis_data:
